name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r adapter/requirements.txt -r bridge/requirements.txt ruff
      # Critical syntax / undefined-name checks only (keeps CI green on style debt).
      - name: Ruff (critical)
        run: ruff check --select=E9,F63,F7,F82 adapter bridge detection rules tests
      - name: Unit tests
        run: |
          PYTHONPATH=. python3 tests/test_epp_core.py
          PYTHONPATH=. python3 tests/test_bridge_helpers.py
          PYTHONPATH=. python3 tests/test_adapter_media.py
          PYTHONPATH=. python3 tests/test_capabilities.py
      - name: epp.gen.ts contract in sync (REQ-S5)
        run: |
          PYTHONPATH=. python3 scripts/gen_epp_types.py
          git diff --exit-code -- contracts/epp.gen.ts
