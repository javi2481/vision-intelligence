# Vision Intelligence — Sprint 1 (Producto B / EPP v4.6 Punto 12)
# Orquestar, no inventar. Un solo comando: docker compose up --build
#
# Perfiles:
#   (default)  mediamtx + paddlex + adapter + bridge
#   --profile demo   → bridge en DEMO_MODE (sin webcam/GPU)
#   --profile rules  → JetLinks opcional
#   --profile gpu    → PaddleX con runtime NVIDIA (requiere NVIDIA Container Toolkit)

name: vision-intelligence

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  epp-network:
    name: epp-network
    driver: bridge

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vi-mediamtx
    restart: unless-stopped
    ports:
      - "${MEDIAMTX_RTSP_PORT:-8554}:8554"
      - "${MEDIAMTX_HLS_PORT:-8888}:8888"
      - "${MEDIAMTX_WEBRTC_PORT:-8889}:8889"
      - "${MEDIAMTX_API_PORT:-9997}:9997"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_LOGLEVEL: info
    networks:
      - epp-network
    # Imagen distroless: sin /bin/sh ni wget → no healthcheck in-container
    logging: *default-logging

  paddlex:
    build:
      context: .
      dockerfile: Dockerfile.paddlex
      args:
        BASE_IMAGE: ${PADDLE_BASE_IMAGE:-paddlepaddle/paddle:3.0.0}
    image: vision-intelligence/paddlex:local
    container_name: vi-paddlex
    restart: unless-stopped
    ports:
      - "${PADDLEX_PORT:-8080}:8080"
    environment:
      - PYTHONUNBUFFERED=1
      # Tras benchmark HPIP ≥~1.5×: VI_USE_HPIP=1 (ver entrypoint.paddlex.sh)
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      # Cache de modelos entre reinicios
      - paddlex-models:/root/.paddlex
    networks:
      - epp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    logging: *default-logging

  # OCR de patente: misma imagen Dockerfile.paddlex, pipeline OCR, puerto propio.
  # Independiente del servicio paddlex (attr) — caída de uno no afecta al otro.
  paddlex-ocr:
    build:
      context: .
      dockerfile: Dockerfile.paddlex
      args:
        BASE_IMAGE: ${PADDLE_BASE_IMAGE:-paddlepaddle/paddle:3.0.0}
    image: vision-intelligence/paddlex-ocr:local
    container_name: vi-paddlex-ocr
    restart: unless-stopped
    ports:
      - "${PADDLEX_OCR_PORT:-8081}:8081"
    environment:
      - PYTHONUNBUFFERED=1
      # Pineado a PP-OCRv5 (mobile) via config propio: el pipeline "OCR" por
      # nombre carga PP-OCRv6 por default, incompatible con paddle:3.0.0 (PIR).
      - VI_PIPELINE=${OCR_PIPELINE_CONFIG:-/opt/paddlex/pipelines/ocr_v5_mobile.yaml}
      - VI_PORT=8081
    volumes:
      # Cache de modelos OCR independiente del cache de attr
      - paddlex-ocr-models:/root/.paddlex
    networks:
      - epp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    logging: *default-logging

  # Object detection general (COCO, 80 clases): misma imagen Dockerfile.paddlex,
  # pipeline object_detection, puerto propio. Aditivo al pipeline vehicle attr
  # (paddlex arriba) — corren ambos sobre cada foto y se mergean en el bridge
  # (ver _run_detections/_merge_object_detections en rtsp_bridge.py). Caída de
  # uno no afecta al otro.
  paddlex-objects:
    build:
      context: .
      dockerfile: Dockerfile.paddlex
      args:
        BASE_IMAGE: ${PADDLE_BASE_IMAGE:-paddlepaddle/paddle:3.0.0}
    image: vision-intelligence/paddlex-objects:local
    container_name: vi-paddlex-objects
    restart: unless-stopped
    ports:
      - "${PADDLEX_OBJECTS_PORT:-8082}:8082"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=object_detection
      - VI_PORT=8082
    volumes:
      # Cache de modelos object_detection independiente del cache de attr/OCR
      - paddlex-objects-models:/root/.paddlex
    networks:
      - epp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    logging: *default-logging

  # Variante GPU (activar: docker compose --profile gpu up --build)
  paddlex-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.paddlex
      args:
        BASE_IMAGE: ${PADDLE_GPU_BASE_IMAGE:-paddlepaddle/paddle:3.0.0-gpu-cuda11.8-cudnn8.9-trt8.6}
        DEVICE: gpu
    image: vision-intelligence/paddlex-gpu:local
    container_name: vi-paddlex-gpu
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "${PADDLEX_PORT:-8080}:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
    volumes:
      - paddlex-models:/root/.paddlex
    networks:
      - epp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    logging: *default-logging

  adapter:
    build:
      context: .
      dockerfile: Dockerfile.adapter
    image: vision-intelligence/adapter:local
    container_name: vi-adapter
    restart: unless-stopped
    ports:
      - "${ADAPTER_PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRACK_TTL_SECONDS=${TRACK_TTL_SECONDS:-10}
      - MAX_DETECTIONS_PER_TRACK=${MAX_DETECTIONS_PER_TRACK:-60}
      - EVENTS_BUFFER_SIZE=${EVENTS_BUFFER_SIZE:-500}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - JETLINKS_WEBHOOK_URL=${JETLINKS_WEBHOOK_URL:-}
      - JETLINKS_API_KEY=${JETLINKS_API_KEY:-demo}
      - RULES_SINK_URL=${RULES_SINK_URL:-http://rules-sink:8850}
      - VI_ENV=${VI_ENV:-development}
      - STATIC_DIR=/app
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - MEDIA_POLL_INTERVAL=${MEDIA_POLL_INTERVAL:-1.0}
      - MEDIA_WATCH_INTERVAL=${MEDIA_WATCH_INTERVAL:-1.0}
      - PREVIEW_MJPEG_INTERVAL=${PREVIEW_MJPEG_INTERVAL:-0.05}
    volumes:
      # Hot-reload en desarrollo
      - ./epp_core.py:/app/epp_core.py
      - ./adapter.py:/app/adapter.py
      - ./amis_dashboard.json:/app/amis_dashboard.json
      - ./dashboard.html:/app/dashboard.html
      - ./placeholder_preview.jpg:/app/placeholder_preview.jpg:ro
      # Fotos de muestra (preview + upload) — RW para POST /media/upload.
      - ./imagenes_muestra:/media/images
    networks:
      - epp-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging

  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: vision-intelligence/bridge:local
    container_name: vi-bridge
    restart: unless-stopped
    depends_on:
      mediamtx:
        condition: service_started
      adapter:
        condition: service_healthy
    environment:
      - RTSP_URL=${RTSP_URL:-rtsp://mediamtx:8554/webcam}
      # SOURCE_URL generaliza el origen (RTSP o archivo local bajo MEDIA_DIR).
      # Vacío = cae a RTSP_URL (default previo intacto, BCS-1).
      - SOURCE_URL=${SOURCE_URL:-}
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - MEDIA_POLL_INTERVAL=${MEDIA_POLL_INTERVAL:-1.0}
      - ADAPTER_INGEST_URL=${ADAPTER_INGEST_URL:-http://adapter:8000/ingest}
      - ADAPTER_MEDIA_CURRENT_URL=${ADAPTER_MEDIA_CURRENT_URL:-http://adapter:8000/media/current}
      - ADAPTER_PREVIEW_FRAME_URL=${ADAPTER_PREVIEW_FRAME_URL:-http://adapter:8000/preview/frame}
      - PADDLEX_URL=${PADDLEX_URL:-http://paddlex:8080}
      - PADDLEX_PREDICT_PATH=${PADDLEX_PREDICT_PATH:-/vehicle-attribute-recognition}
      - BRIDGE_FPS=${BRIDGE_FPS:-5}
      - BRIDGE_MAX_WIDTH=${BRIDGE_MAX_WIDTH:-960}
      - JPEG_QUALITY=${JPEG_QUALITY:-80}
      - DEMO_MODE=${DEMO_MODE:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKOFF_INITIAL=${BACKOFF_INITIAL:-1}
      - BACKOFF_MAX=${BACKOFF_MAX:-30}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-30}
      - PADDLEX_OCR_URL=${PADDLEX_OCR_URL:-http://paddlex-ocr:8081}
      - PADDLEX_OBJECTS_URL=${PADDLEX_OBJECTS_URL:-http://paddlex-objects:8082}
      - PADDLEX_OBJECTS_PREDICT_PATH=${PADDLEX_OBJECTS_PREDICT_PATH:-/object-detection}
      - ENABLE_PLATE_OCR=${ENABLE_PLATE_OCR:-false}
      - OCR_MIN_SCORE=${OCR_MIN_SCORE:-0.7}
      - OCR_EVERY_N_FRAMES=${OCR_EVERY_N_FRAMES:-5}
      - OCR_TOPK=${OCR_TOPK:-3}
      - OCR_HTTP_TIMEOUT=${OCR_HTTP_TIMEOUT:-5}
    volumes:
      # Fotos de muestra — mismo layout RO que adapter (sin videos_muestra).
      - ./imagenes_muestra:/media/images:ro
    networks:
      - epp-network
    logging: *default-logging

  # Bridge demo: consolida tracks + AMIS sin webcam ni PaddleX.
  # NO usar junto al bridge real: mezcla detecciones sintéticas (ABC123) en /events.
  bridge-demo:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: vision-intelligence/bridge:local
    container_name: vi-bridge-demo
    restart: unless-stopped
    depends_on:
      adapter:
        condition: service_healthy
    environment:
      - ADAPTER_INGEST_URL=http://adapter:8000/ingest
      - DEMO_MODE=1
      - BRIDGE_FPS=1
      - LOG_LEVEL=INFO
    networks:
      - epp-network
    logging: *default-logging

  jetlinks:
    profiles: ["rules"]
    image: jetlinks/jetlinks-standalone:latest
    container_name: vi-jetlinks
    restart: unless-stopped
    ports:
      - "${JETLINKS_PORT:-8848}:8848"
    environment:
      - JAVA_OPTS=-Xmx512m
    networks:
      - epp-network
    logging: *default-logging

  # Sink de reglas headless (MVP): decide sobre PerceptionEvents reenviados
  # por el adaptador. Alternativa reproducible/inspeccionable a la UI SQL de
  # jetlinks (arriba), que queda como opción manual. Ambos corren bajo el
  # mismo profile sin conflicto.
  rules-sink:
    profiles: ["rules"]
    build:
      context: .
      dockerfile: Dockerfile.rules-sink
    image: vision-intelligence/rules-sink:local
    container_name: vi-rules-sink
    restart: unless-stopped
    ports:
      - "${RULES_SINK_PORT:-8850}:8850"
    environment:
      - RULES_SINK_API_KEY=${RULES_SINK_API_KEY:-demo}
      - RULES_SINK_MAX_ALERTS=${RULES_SINK_MAX_ALERTS:-100}
      - VI_ENV=${VI_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Hot-reload en desarrollo (paridad con adapter)
      - ./rules_sink.py:/app/rules_sink.py
    networks:
      - epp-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8850/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging

volumes:
  paddlex-models:
    name: vi-paddlex-models
  paddlex-ocr-models:
    name: vi-paddlex-ocr-models
  paddlex-objects-models:
    name: vi-paddlex-objects-models
