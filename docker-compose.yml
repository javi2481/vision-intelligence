# Vision Intelligence — foto-only (Producto B / EPP v4.6 Punto 12)
# Orquestar, no inventar. Un solo comando: docker compose up --build
#
# Perfiles:
#   (default)  paddlex + paddlex-objects + paddlex-ocr + adapter + bridge
#   --profile extended → faces, pedestrians, scene, pose, face_id, signs
#   --profile experimental → scene_cls, instances, small_objects, anomaly, open_vocab
#   --profile demo   → bridge en DEMO_MODE (sin fotos/GPU)
#   --profile rules  → JetLinks opcional
#   --profile gpu    → PaddleX con runtime NVIDIA (requiere NVIDIA Container Toolkit)
#
# RAM (mem_limit por contenedor paddlex):
#   - Notebook ~8 GB: solo profile default (límites ~1.2g). NO levantar extended.
#   - Desktop ~32 GB: default + extended (límites ~2g). experimental opt-in.
#   Si un servicio OOMKilled, subí su mem_limit o bajá BRIDGE_MAX_WIDTH.
#
# Layout: detection/{vehicles,objects,plates,faces,pedestrians,scene} + bridge + adapter.
# Ver README.md (mapa carpeta ↔ capacidad ↔ servicio).

name: vision-intelligence

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-paddlex-build: &paddlex-build
  context: .
  dockerfile: infra/Dockerfile.paddlex
  args:
    BASE_IMAGE: ${PADDLE_BASE_IMAGE:-paddlepaddle/paddle:3.0.0}

# Techos para notebook 8 GB (solo default: 3 servicios ≈ 3.6g modelos).
x-limits-default: &limits-default
  mem_limit: 1200m
  mem_reservation: 400m
  cpus: "1.0"

# Techos para desktop 32 GB (extended / experimental).
x-limits-extended: &limits-extended
  mem_limit: 2000m
  mem_reservation: 512m
  cpus: "1.5"

x-paddlex-health: &paddlex-health
  interval: 30s
  timeout: 10s
  retries: 20
  start_period: 300s

x-paddlex-cpu: &paddlex-cpu
  build: *paddlex-build
  restart: unless-stopped
  networks:
    - epp-network
  logging: *default-logging

networks:
  epp-network:
    name: epp-network
    driver: bridge

services:
  paddlex:
    <<: [*paddlex-cpu, *limits-default]
    image: vision-intelligence/paddlex:local
    container_name: vi-paddlex
    ports:
      - "${PADDLEX_PORT:-8080}:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/"]
      <<: *paddlex-health

  paddlex-ocr:
    <<: [*paddlex-cpu, *limits-default]
    image: vision-intelligence/paddlex-ocr:local
    container_name: vi-paddlex-ocr
    ports:
      - "${PADDLEX_OCR_PORT:-8081}:8081"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=${OCR_PIPELINE_CONFIG:-/opt/paddlex/pipelines/ocr_v5_mobile.yaml}
      - VI_PORT=8081
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-ocr-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/"]
      <<: *paddlex-health

  # Object detection COCO (person, dog, …). Merge en detection/objects.

  paddlex-objects:
    <<: [*paddlex-cpu, *limits-default]
    image: vision-intelligence/paddlex-objects:local
    container_name: vi-paddlex-objects
    ports:
      - "${PADDLEX_OBJECTS_PORT:-8082}:8082"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=object_detection
      - VI_PORT=8082
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-objects-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/"]
      <<: *paddlex-health

  paddlex-faces:
    profiles: ["extended"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-faces:local
    container_name: vi-paddlex-faces
    ports:
      - "${PADDLEX_FACES_PORT:-8083}:8083"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=face_detection
      - VI_PORT=8083
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-faces-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/"]
      <<: *paddlex-health

  paddlex-pedestrians:
    profiles: ["extended"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-pedestrians:local
    container_name: vi-paddlex-pedestrians
    ports:
      - "${PADDLEX_PEDESTRIANS_PORT:-8084}:8084"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=pedestrian_attribute_recognition
      - VI_PORT=8084
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-pedestrians-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/"]
      <<: *paddlex-health

  paddlex-scene:
    profiles: ["extended"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-scene:local
    container_name: vi-paddlex-scene
    ports:
      - "${PADDLEX_SCENE_PORT:-8085}:8085"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=${SCENE_PIPELINE_CONFIG:-semantic_segmentation}
      - VI_PORT=8085
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-scene-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8085/"]
      <<: *paddlex-health

  paddlex-pose:
    profiles: ["extended"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-pose:local
    container_name: vi-paddlex-pose
    ports:
      - "${PADDLEX_POSE_PORT:-8086}:8086"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=human_keypoint_detection
      - VI_PORT=8086
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-pose-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8086/"]
      <<: *paddlex-health

  paddlex-face-id:
    profiles: ["extended"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-face-id:local
    container_name: vi-paddlex-face-id
    ports:
      - "${PADDLEX_FACE_ID_PORT:-8087}:8087"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=face_recognition
      - VI_PORT=8087
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-face-id-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8087/"]
      <<: *paddlex-health

  paddlex-signs:
    profiles: ["extended"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-signs:local
    container_name: vi-paddlex-signs
    ports:
      - "${PADDLEX_SIGNS_PORT:-8088}:8088"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=object_detection
      - VI_PORT=8088
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-signs-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/"]
      <<: *paddlex-health

  paddlex-scene-cls:
    profiles: ["experimental"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-scene-cls:local
    container_name: vi-paddlex-scene-cls
    ports:
      - "8089:8089"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=image_classification
      - VI_PORT=8089
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-scene-cls-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8089/"]
      <<: *paddlex-health

  paddlex-instances:
    profiles: ["experimental"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-instances:local
    container_name: vi-paddlex-instances
    ports:
      - "8090:8090"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=instance_segmentation
      - VI_PORT=8090
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-instances-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/"]
      <<: *paddlex-health

  paddlex-small-objects:
    profiles: ["experimental"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-small-objects:local
    container_name: vi-paddlex-small-objects
    ports:
      - "8091:8091"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=small_object_detection
      - VI_PORT=8091
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-small-objects-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8091/"]
      <<: *paddlex-health

  paddlex-anomaly:
    profiles: ["experimental"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-anomaly:local
    container_name: vi-paddlex-anomaly
    ports:
      - "8092:8092"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=anomaly_detection
      - VI_PORT=8092
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-anomaly-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8092/"]
      <<: *paddlex-health

  paddlex-open-vocab:
    profiles: ["experimental"]
    <<: [*paddlex-cpu, *limits-extended]
    image: vision-intelligence/paddlex-open-vocab:local
    container_name: vi-paddlex-open-vocab
    ports:
      - "8093:8093"
    environment:
      - PYTHONUNBUFFERED=1
      - VI_PIPELINE=open_vocabulary_detection
      - VI_PORT=8093
      - VI_USE_HPIP=${VI_USE_HPIP:-0}
    volumes:
      - paddlex-open-vocab-models:/root/.paddlex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8093/"]
      <<: *paddlex-health


  paddlex-gpu:
    profiles: ["gpu"]
    <<: *limits-extended
    build:
      context: .
      dockerfile: infra/Dockerfile.paddlex
      args:
        BASE_IMAGE: ${PADDLE_GPU_BASE_IMAGE:-paddlepaddle/paddle:3.0.0-gpu-cuda11.8-cudnn8.9-trt8.6}
        DEVICE: gpu
    image: vision-intelligence/paddlex-gpu:local
    container_name: vi-paddlex-gpu
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "${PADDLEX_PORT:-8080}:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
      - VI_DEVICE=gpu
    volumes:
      - paddlex-models:/root/.paddlex
    networks:
      - epp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/"]
      <<: *paddlex-health
    logging: *default-logging

  adapter:
    build:
      context: .
      dockerfile: adapter/Dockerfile
    image: vision-intelligence/adapter:local
    container_name: vi-adapter
    restart: unless-stopped
    ports:
      - "${ADAPTER_PORT:-8000}:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRACK_TTL_SECONDS=${TRACK_TTL_SECONDS:-10}
      - MAX_DETECTIONS_PER_TRACK=${MAX_DETECTIONS_PER_TRACK:-60}
      - EVENTS_BUFFER_SIZE=${EVENTS_BUFFER_SIZE:-500}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - IDENTITY_HASH_SALT=${IDENTITY_HASH_SALT:-}
      - JETLINKS_WEBHOOK_URL=${JETLINKS_WEBHOOK_URL:-}
      - JETLINKS_API_KEY=${JETLINKS_API_KEY:-demo}
      - RULES_SINK_URL=${RULES_SINK_URL:-http://rules-sink:8850}
      - VI_ENV=${VI_ENV:-development}
      - STATIC_DIR=/app/adapter/ui
      - PYTHONPATH=/app
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - MEDIA_POLL_INTERVAL=${MEDIA_POLL_INTERVAL:-1.0}
      - MEDIA_WATCH_INTERVAL=${MEDIA_WATCH_INTERVAL:-1.0}
      - PREVIEW_MJPEG_INTERVAL=${PREVIEW_MJPEG_INTERVAL:-0.05}
    volumes:
      - ./adapter:/app/adapter
      - ./imagenes_muestra:/media/images
    networks:
      - epp-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging

  bridge:
    build:
      context: .
      dockerfile: bridge/Dockerfile
    image: vision-intelligence/bridge:local
    container_name: vi-bridge
    restart: unless-stopped
    depends_on:
      adapter:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - MEDIA_POLL_INTERVAL=${MEDIA_POLL_INTERVAL:-1.0}
      - ADAPTER_INGEST_URL=${ADAPTER_INGEST_URL:-http://adapter:8000/ingest}
      - ADAPTER_MEDIA_CURRENT_URL=${ADAPTER_MEDIA_CURRENT_URL:-http://adapter:8000/media/current}
      - ADAPTER_PREVIEW_FRAME_URL=${ADAPTER_PREVIEW_FRAME_URL:-http://adapter:8000/preview/frame}
      - PADDLEX_URL=${PADDLEX_URL:-http://paddlex:8080}
      - PADDLEX_PREDICT_PATH=${PADDLEX_PREDICT_PATH:-/vehicle-attribute-recognition}
      - BRIDGE_FPS=${BRIDGE_FPS:-1}
      - BRIDGE_MAX_WIDTH=${BRIDGE_MAX_WIDTH:-960}
      - JPEG_QUALITY=${JPEG_QUALITY:-80}
      - DEMO_MODE=${DEMO_MODE:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-30}
      - PADDLEX_OCR_URL=${PADDLEX_OCR_URL:-http://paddlex-ocr:8081}
      - PADDLEX_OBJECTS_URL=${PADDLEX_OBJECTS_URL:-http://paddlex-objects:8082}
      - PADDLEX_OBJECTS_PREDICT_PATH=${PADDLEX_OBJECTS_PREDICT_PATH:-/object-detection}
      - ENABLE_PLATE_OCR=${ENABLE_PLATE_OCR:-false}
      - OCR_MIN_SCORE=${OCR_MIN_SCORE:-0.7}
      - OCR_EVERY_N_FRAMES=${OCR_EVERY_N_FRAMES:-5}
      - OCR_TOPK=${OCR_TOPK:-3}
      - OCR_HTTP_TIMEOUT=${OCR_HTTP_TIMEOUT:-5}
      - PADDLEX_FACES_URL=${PADDLEX_FACES_URL:-http://paddlex-faces:8083}
      - PADDLEX_FACES_PREDICT_PATH=${PADDLEX_FACES_PREDICT_PATH:-/face-detection}
      - ENABLE_FACE_DETECTION=${ENABLE_FACE_DETECTION:-false}
      - PADDLEX_PEDESTRIANS_URL=${PADDLEX_PEDESTRIANS_URL:-http://paddlex-pedestrians:8084}
      - PADDLEX_PEDESTRIANS_PREDICT_PATH=${PADDLEX_PEDESTRIANS_PREDICT_PATH:-/pedestrian-attribute-recognition}
      - ENABLE_PEDESTRIAN_ATTRS=${ENABLE_PEDESTRIAN_ATTRS:-false}
      - PADDLEX_SCENE_URL=${PADDLEX_SCENE_URL:-http://paddlex-scene:8085}
      - PADDLEX_SCENE_PREDICT_PATH=${PADDLEX_SCENE_PREDICT_PATH:-/semantic-segmentation}
      - ENABLE_SCENE_SEG=${ENABLE_SCENE_SEG:-false}
      - SCENE_LABEL_MODE=${SCENE_LABEL_MODE:-cityscapes}
      - CROSSWALK_MIN_RATIO=${CROSSWALK_MIN_RATIO:-0.01}
      - ENABLE_POSE=${ENABLE_POSE:-false}
      - PADDLEX_POSE_URL=${PADDLEX_POSE_URL:-http://paddlex-pose:8086}
      - ENABLE_SCENE_OCR=${ENABLE_SCENE_OCR:-false}
      - SCENE_OCR_MIN_SCORE=${SCENE_OCR_MIN_SCORE:-0.5}
      - SCENE_OCR_MAX_LINES=${SCENE_OCR_MAX_LINES:-20}
      - ENABLE_FACE_ID=${ENABLE_FACE_ID:-false}
      - PADDLEX_FACE_ID_URL=${PADDLEX_FACE_ID_URL:-http://paddlex-face-id:8087}
      - ENABLE_SIGNS=${ENABLE_SIGNS:-false}
      - PADDLEX_SIGNS_URL=${PADDLEX_SIGNS_URL:-http://paddlex-signs:8088}
      - SIGNS_LABELS=${SIGNS_LABELS:-}
      - ENABLE_SCENE_CLS=${ENABLE_SCENE_CLS:-false}
      - PADDLEX_SCENE_CLS_URL=${PADDLEX_SCENE_CLS_URL:-http://paddlex-scene-cls:8089}
      - ENABLE_INSTANCE_SEG=${ENABLE_INSTANCE_SEG:-false}
      - PADDLEX_INSTANCES_URL=${PADDLEX_INSTANCES_URL:-http://paddlex-instances:8090}
      - ENABLE_SMALL_OBJECTS=${ENABLE_SMALL_OBJECTS:-false}
      - PADDLEX_SMALL_OBJECTS_URL=${PADDLEX_SMALL_OBJECTS_URL:-http://paddlex-small-objects:8091}
      - ENABLE_ANOMALY=${ENABLE_ANOMALY:-false}
      - PADDLEX_ANOMALY_URL=${PADDLEX_ANOMALY_URL:-http://paddlex-anomaly:8092}
      - ENABLE_OPEN_VOCAB=${ENABLE_OPEN_VOCAB:-false}
      - PADDLEX_OPEN_VOCAB_URL=${PADDLEX_OPEN_VOCAB_URL:-http://paddlex-open-vocab:8093}
      - OPEN_VOCAB_PROMPT=${OPEN_VOCAB_PROMPT:-person,car,traffic sign}
    volumes:
      - ./detection:/app/detection:ro
      - ./bridge:/app/bridge:ro
      - ./imagenes_muestra:/media/images:ro
    networks:
      - epp-network
    logging: *default-logging

  bridge-demo:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: bridge/Dockerfile
    image: vision-intelligence/bridge:local
    container_name: vi-bridge-demo
    restart: unless-stopped
    depends_on:
      adapter:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - ADAPTER_INGEST_URL=http://adapter:8000/ingest
      - DEMO_MODE=1
      - BRIDGE_FPS=1
      - LOG_LEVEL=INFO
    networks:
      - epp-network
    logging: *default-logging

  jetlinks:
    profiles: ["rules"]
    image: jetlinks/jetlinks-standalone:latest
    container_name: vi-jetlinks
    restart: unless-stopped
    ports:
      - "${JETLINKS_PORT:-8848}:8848"
    environment:
      - JAVA_OPTS=-Xmx512m
    networks:
      - epp-network
    logging: *default-logging

  rules-sink:
    profiles: ["rules"]
    build:
      context: .
      dockerfile: rules/Dockerfile
    image: vision-intelligence/rules-sink:local
    container_name: vi-rules-sink
    restart: unless-stopped
    ports:
      - "${RULES_SINK_PORT:-8850}:8850"
    environment:
      - PYTHONPATH=/app
      - RULES_SINK_API_KEY=${RULES_SINK_API_KEY:-demo}
      - RULES_SINK_MAX_ALERTS=${RULES_SINK_MAX_ALERTS:-100}
      - VI_ENV=${VI_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./rules:/app/rules
    networks:
      - epp-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8850/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging

volumes:
  paddlex-models:
    name: vi-paddlex-models
  paddlex-ocr-models:
    name: vi-paddlex-ocr-models
  paddlex-objects-models:
    name: vi-paddlex-objects-models
  paddlex-faces-models:
    name: vi-paddlex-faces-models
  paddlex-pedestrians-models:
    name: vi-paddlex-pedestrians-models
  paddlex-scene-models:
    name: vi-paddlex-scene-models
  paddlex-pose-models:
    name: vi-paddlex-pose-models
  paddlex-face-id-models:
    name: vi-paddlex-face-id-models
  paddlex-signs-models:
    name: vi-paddlex-signs-models
  paddlex-scene-cls-models:
    name: vi-paddlex-scene-cls-models
  paddlex-instances-models:
    name: vi-paddlex-instances-models
  paddlex-small-objects-models:
    name: vi-paddlex-small-objects-models
  paddlex-anomaly-models:
    name: vi-paddlex-anomaly-models
  paddlex-open-vocab-models:
    name: vi-paddlex-open-vocab-models
