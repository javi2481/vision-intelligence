# MediaMTX — RTSP / WebRTC / HLS
# paths.all_others: acepta publicación dinámica (FFmpeg → /webcam)

logLevel: info

rtsp: yes
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001

hls: yes
hlsAddress: :8888

webrtc: yes
webrtcAddress: :8889
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

api: yes
apiAddress: :9997

authInternalUsers:
  - user: any
    permissions:
      - action: publish
      - action: read
      - action: playback

pathDefaults:
  source: publisher

paths:
  webcam:
  all_others:
